# Wlaczenie AndroidX (wymagane dla Compose i nowych bibliotek)
android.useAndroidX=true
# Automatyczna konwersja starych bibliotek na AndroidX
android.enableJetifier=true

# Zwiekszenie pamieci dla Gradle, aby uniknac OutOfMemoryError
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
