; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_nrf52840_sense]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense
framework = arduino
monitor_speed = 115200
lib_archive = no
build_src_filter =
  +<*>
  -<formatter_main.cpp>
  -<fatfs/>
build_flags =
  -D USE_TINYUSB
lib_deps =
  https://github.com/Seeed-Studio/Seeed_Arduino_LSM6DS3.git
  adafruit/Adafruit SPIFlash
  adafruit/SdFat - Adafruit Fork

[env:seeed_xiao_nrf52840_sense_formatter]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense
framework = arduino
monitor_speed = 115200
lib_archive = no
build_src_filter =
  -<*>
  +<formatter_main.cpp>
  +<fatfs/>
build_flags =
  -D USE_TINYUSB
lib_deps =
  adafruit/Adafruit SPIFlash
  adafruit/SdFat - Adafruit Fork
